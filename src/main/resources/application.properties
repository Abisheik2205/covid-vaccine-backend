# =============================================================
# application.properties \u2014 CONFIGURATION FILE
#
# The syntax ${VARIABLE:default} means:
#   - Use the environment variable if it exists (on Render)
#   - Otherwise use the default value (on your local PC)
#
# So locally this uses H2 (no setup needed).
# On Render this uses PostgreSQL (you set the env variables).
# =============================================================

spring.application.name=demo

# Server port \u2014 Render sets PORT automatically, locally uses 8080
server.port=${PORT:8080}

# Database \u2014 H2 locally, PostgreSQL on Render
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:vaccinedb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA / Hibernate
# "update" = create tables if missing, update structure if changed
# NEVER use "create-drop" in production \u2014 it wipes ALL data on restart!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 web console \u2014 visit http://localhost:8080/h2-console to see local DB
spring.h2.console.enabled=${H2_CONSOLE:true}
spring.h2.console.path=/h2-console

# JSON formatting \u2014 dates as "2023-01-15" not timestamps
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
