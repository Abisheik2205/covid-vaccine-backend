# ============================================================
# application.properties — Spring Boot Configuration
# No database URL needed — Firebase handles everything!
# ============================================================

# App name
spring.application.name=covid-vaccine-app

# Server port (Cloud Run uses 8080)
server.port=8080

# Disable JPA/DataSource auto-configuration (not needed for Firestore)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Allow static files to be served (index.html)
spring.web.resources.static-locations=classpath:/static/

# Logging
logging.level.com.example.demo=INFO
